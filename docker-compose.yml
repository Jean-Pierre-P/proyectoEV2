version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      timeout: 5s
      retries: 10
      interval: 10s
    networks:
      - back-net

  # Nuevo servicio para manejar Usuarios y Productos desde db.json
  mock-api:
    image: node:18-alpine
    container_name: mock-api
    working_dir: /app
    volumes:
      - ./front_despacho:/app
    ports:
      - "3000:3000"
    command: npx json-server --watch db.json --host 0.0.0.0
    networks:
      - front-net

  back-despachos:
    # ... (resto de tu configuración actual)
    networks:
      - back-net
      - front-net
    # ...

  frontend:
    # ... (resto de tu configuración actual)
    depends_on:
      - back-despachos
      - mock-api
    networks:
      - front-net

networks:
  front-net:
  back-net:

volumes:
  mysql_data:
    driver: local